name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: researchops_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r ../requirements.txt

      - name: Run backend tests with coverage
        env:
          TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/researchops_test
        run: |
          python -m pytest ../tests/backend/ -q --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=html:../coverage-backend \
            --cov-report=xml:../coverage-backend.xml

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: coverage-backend/
          retention-days: 14

      - name: Upload XML coverage (for PR comments / external tools)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: coverage-backend.xml
          retention-days: 14

      - name: Lint backend
        run: python -m ruff check .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/dashboard/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run frontend unit tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-html
          path: frontend/dashboard/coverage/
          retention-days: 14

      - name: Lint frontend
        run: npm run lint

  e2e:
    runs-on: ubuntu-latest
    # Only run E2E on push to main or when the label 'run-e2e' is present on a PR
    if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'run-e2e')
    needs: [backend, frontend]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: researchops_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/researchops_e2e
      EMBED_DEVICE: cpu
      HF_WAIT_FOR_MODEL: "false"
      EMBED_WORKERS: "1"
      CORS_ALLOW_ORIGINS: "http://localhost:5173"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/dashboard/package-lock.json

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r ../requirements.txt

      - name: Run database migrations
        working-directory: backend
        env:
          PYTHONPATH: ./services/api:./services/orchestrator:./libs:./data
        run: python -m alembic upgrade head

      - name: Install frontend dependencies
        working-directory: frontend/dashboard
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend/dashboard
        run: npx playwright install --with-deps chromium

      - name: Start API server
        working-directory: backend
        env:
          PYTHONPATH: ./services/api:./services/orchestrator:./libs:./data
        run: python -m main >> /tmp/api.log 2>&1 &

      - name: Start worker
        working-directory: backend
        env:
          PYTHONPATH: ./services/workers:./services/orchestrator:./libs:./data
        run: python -m main >> /tmp/worker.log 2>&1 &

      - name: Start frontend dev server
        working-directory: frontend/dashboard
        run: npm run dev >> /tmp/vite.log 2>&1 &

      - name: Wait for API server to be ready
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:8000/health; do sleep 3; done'

      - name: Wait for frontend dev server to be ready
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:5173; do sleep 2; done'

      - name: Run Playwright E2E tests
        working-directory: frontend/dashboard
        run: npx playwright test

      - name: Upload API server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-server-log
          path: /tmp/api.log
          retention-days: 7

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/dashboard/playwright-report/
          retention-days: 14
