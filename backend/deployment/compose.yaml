x-secret-env: &secret-env
  AUTH_JWT_SECRET: ${AUTH_JWT_SECRET-}
  AUTH_REFRESH_TOKEN_SECRET: ${AUTH_REFRESH_TOKEN_SECRET-}
  AUTH_PASSWORD_RESET_SECRET: ${AUTH_PASSWORD_RESET_SECRET-}
  HOSTED_LLM_API_KEY: ${HOSTED_LLM_API_KEY-}
  TAVILY_API_KEY: ${TAVILY_API_KEY-}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY-}
  AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN-}
  HF_TOKEN: ${HF_TOKEN-}
  SMTP_PASSWORD: ${SMTP_PASSWORD-}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY-}

name: research_studio

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: researchops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d researchops"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  postgres_test_db_init:
    image: pgvector/pgvector:pg16
    environment:
      PGPASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/sh
      - -ec
      - >
        psql -h postgres -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'researchops_test'" |
        grep -q 1 ||
        psql -h postgres -U postgres -d postgres -c "CREATE DATABASE researchops_test"
    restart: "no"

  backend-tests:
    build:
      context: ../..
      dockerfile: backend/deployment/docker/api.Dockerfile
      target: dev
    depends_on:
      postgres_test_db_init:
        condition: service_completed_successfully
    volumes:
      - ../../tests:/app/tests
    working_dir: /app
    environment:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/researchops_test
      PYTHONPATH: /app/services/api:/app/services/orchestrator:/app/services/workers:/app/libs:/app/libs/research_rules:/app/data
    command: >
      bash -c "
        pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu &&
        python -m pytest tests/backend/ -q --tb=short
      "
    restart: "no"
    profiles:
      - test

  api:
    build:
      context: ../..
      dockerfile: backend/deployment/docker/api.Dockerfile
      target: production
    env_file:
      - path: ../../.env
        required: false
    environment:
      <<: *secret-env
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/researchops
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  worker:
    build:
      context: ../..
      dockerfile: backend/deployment/docker/worker.Dockerfile
      target: production
    gpus: all
    env_file:
      - path: ../../.env
        required: false
    environment:
      <<: *secret-env
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/researchops
      HF_HOME: /app/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /app/.cache/huggingface/hub
      TRANSFORMERS_CACHE: /app/.cache/huggingface/transformers
      SENTENCE_TRANSFORMERS_HOME: /app/.cache/sentence-transformers
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      LLM_DRAFT_REQUIRED: "true"
      LLM_OUTLINE_REQUIRED: "true"
      LLM_CLAIM_REQUIRED: "true"
      LLM_EVALUATOR_REQUIRED: "true"
      LLM_REPAIR_REQUIRED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - hf_cache:/app/.cache/huggingface
      - st_cache:/app/.cache/sentence-transformers

volumes:
  postgres_data: {}
  hf_cache: {}
  st_cache: {}
